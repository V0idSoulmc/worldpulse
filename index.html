<title>WorldPulse — Atlas Mondial</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Space+Grotesk:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#04060f;--s1:#080d1a;--s2:#0c1424;--border:#162040;
  --a1:#c8a96e;--a2:#4fc3f7;--a3:#81c995;--a4:#f48fb1;
  --text:#dde8f5;--dim:#4a6080;--land:#162d4a;--hover:#1e4570;
  --ocean:#030810;--glow:rgba(200,169,110,0.15);
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;background:var(--bg);}
body{font-family:'Space Grotesk',sans-serif;color:var(--text);}
#hdr{position:fixed;top:0;left:0;right:0;z-index:300;
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 28px;
  background:linear-gradient(180deg,rgba(4,6,15,.97) 0%,transparent 100%);
  pointer-events:none;}
.logo{display:flex;align-items:center;gap:12px;pointer-events:auto;}
.logo-icon{width:32px;height:32px;border:1px solid var(--a1);border-radius:50%;
  display:flex;align-items:center;justify-content:center;position:relative;}
.logo-ring{position:absolute;inset:-3px;border-radius:50%;border:1px solid rgba(200,169,110,.3);
  animation:spin-slow 20s linear infinite;}
@keyframes spin-slow{to{transform:rotate(360deg)}}
.logo-dot{width:8px;height:8px;background:var(--a1);border-radius:50%;
  box-shadow:0 0 8px var(--a1);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
.logo-name{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;
  color:#fff;letter-spacing:.05em;}
.logo-name span{color:var(--a1);font-style:italic;}
.logo-sub{font-family:'Space Mono',monospace;font-size:9px;color:var(--dim);
  text-transform:uppercase;letter-spacing:.2em;margin-top:1px;}
.hdr-right{display:flex;align-items:center;gap:12px;pointer-events:auto;}
.proj-toggle{display:flex;background:rgba(22,32,64,.8);border:1px solid var(--border);
  border-radius:6px;overflow:hidden;}
.proj-btn{padding:5px 12px;font-family:'Space Mono',monospace;font-size:10px;
  color:var(--dim);cursor:pointer;transition:all .2s;border:none;background:transparent;}
.proj-btn.active{background:rgba(200,169,110,.15);color:var(--a1);}
.live-tag{display:flex;align-items:center;gap:6px;
  background:rgba(22,32,64,.8);border:1px solid var(--border);
  border-radius:20px;padding:5px 12px;
  font-family:'Space Mono',monospace;font-size:10px;color:var(--dim);}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--a3);
  box-shadow:0 0 6px var(--a3);animation:pulse 2s infinite;}
#map-wrap{position:absolute;inset:0;}
#world-map{width:100%;height:100%;cursor:grab;}
#world-map:active{cursor:grabbing;}
.sphere{fill:var(--ocean);}
.graticule{fill:none;stroke:rgba(255,255,255,.03);stroke-width:.4;}
.country{fill:var(--land);stroke:#0a1830;stroke-width:.4;
  cursor:pointer;transition:fill .25s;}
.country:hover{fill:var(--hover);}
.country.active{fill:var(--a1);filter:drop-shadow(0 0 8px rgba(200,169,110,.5));}
.country.dimmed{fill:#0a1422;opacity:.5;}
#zoom-btns{position:fixed;bottom:28px;right:28px;z-index:200;
  display:flex;flex-direction:column;gap:4px;}
.zbtn{width:36px;height:36px;background:rgba(8,13,26,.9);border:1px solid var(--border);
  color:var(--dim);border-radius:8px;font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .2s;font-family:monospace;}
.zbtn:hover{border-color:var(--a1);color:var(--a1);}
#search-wrap{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);
  z-index:200;width:320px;}
#search-box{display:flex;align-items:center;gap:10px;
  background:rgba(8,13,26,.95);border:1px solid var(--border);
  border-radius:28px;padding:10px 18px;
  backdrop-filter:blur(16px);transition:border-color .2s;}
#search-box:focus-within{border-color:rgba(200,169,110,.4);}
.s-icon{font-size:13px;color:var(--dim);}
#s-input{background:none;border:none;outline:none;color:var(--text);
  font-family:'Space Grotesk',sans-serif;font-size:13px;flex:1;}
#s-input::placeholder{color:var(--dim);}
#s-results{position:absolute;bottom:calc(100% + 6px);left:0;right:0;
  background:rgba(8,13,26,.98);border:1px solid var(--border);border-radius:12px;
  overflow:hidden;display:none;max-height:220px;overflow-y:auto;}
.s-item{padding:9px 18px;font-size:13px;cursor:pointer;
  display:flex;align-items:center;gap:10px;transition:background .15s;}
.s-item:hover{background:rgba(200,169,110,.08);}
.s-item-flag{width:20px;height:14px;border-radius:2px;border:1px solid rgba(255,255,255,.1);}
.s-item-name{flex:1;}
.s-item-code{font-family:'Space Mono',monospace;font-size:10px;color:var(--dim);}
#panel{position:fixed;top:0;right:-520px;width:500px;height:100%;
  background:rgba(8,13,26,.97);border-left:1px solid var(--border);
  backdrop-filter:blur(20px);
  transition:right .45s cubic-bezier(.16,1,.3,1);
  z-index:250;display:flex;flex-direction:column;overflow:hidden;}
#panel.open{right:0;}
.p-hdr{flex-shrink:0;padding:24px 24px 0;position:relative;}
#p-close{position:absolute;top:20px;right:20px;
  width:30px;height:30px;border-radius:50%;
  background:rgba(255,255,255,.04);border:1px solid var(--border);
  color:var(--dim);cursor:pointer;font-size:14px;
  display:flex;align-items:center;justify-content:center;transition:all .2s;}
#p-close:hover{border-color:var(--a4);color:var(--a4);}
.p-flag-wrap{width:80px;height:53px;border-radius:6px;
  overflow:hidden;border:1px solid var(--border);margin-bottom:12px;
  box-shadow:0 4px 20px rgba(0,0,0,.5);}
#p-flag{width:100%;height:100%;}
.p-country{font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:600;color:#fff;line-height:1.1;}
.p-capital{font-family:'Space Mono',monospace;font-size:10px;color:var(--dim);
  text-transform:uppercase;letter-spacing:.15em;margin-top:4px;}
.p-badges{display:flex;flex-wrap:wrap;gap:6px;padding:14px 24px;
  border-bottom:1px solid var(--border);}
.badge{padding:3px 9px;border-radius:10px;font-size:10px;
  font-family:'Space Mono',monospace;letter-spacing:.08em;border:1px solid;}
.b-green{background:rgba(129,201,149,.08);border-color:rgba(129,201,149,.3);color:var(--a3);}
.b-red{background:rgba(244,143,177,.08);border-color:rgba(244,143,177,.3);color:var(--a4);}
.b-orange{background:rgba(255,165,0,.08);border-color:rgba(255,165,0,.3);color:#ffa500;}
.b-blue{background:rgba(79,195,247,.08);border-color:rgba(79,195,247,.3);color:var(--a2);}
.b-gold{background:rgba(200,169,110,.08);border-color:rgba(200,169,110,.3);color:var(--a1);}
.b-purple{background:rgba(180,100,255,.08);border-color:rgba(180,100,255,.3);color:#b464ff;}
#p-scroll{flex:1;overflow-y:auto;min-height:0;}
#p-scroll::-webkit-scrollbar{width:2px;}
#p-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:1px;}
.p-body{padding:16px 24px 8px;}
.sec{margin-bottom:20px;}
.sec-ttl{font-family:'Space Mono',monospace;font-size:9px;text-transform:uppercase;
  letter-spacing:.25em;color:var(--a1);margin-bottom:10px;
  display:flex;align-items:center;gap:8px;}
.sec-ttl::after{content:'';flex:1;height:1px;background:var(--border);}
.wx-card{background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:14px 16px;}
.wx-main{display:flex;align-items:center;gap:14px;margin-bottom:12px;}
.wx-icon{font-size:2.4rem;}
.wx-temp{font-family:'Cormorant Garamond',serif;font-size:2.8rem;color:#fff;line-height:1;}
.wx-desc{font-size:12px;color:var(--dim);margin-top:2px;}
.wx-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.wx-stat{background:var(--s1);border:1px solid var(--border);border-radius:7px;padding:8px 10px;}
.wx-stat-lbl{font-family:'Space Mono',monospace;font-size:9px;color:var(--dim);margin-bottom:3px;}
.wx-stat-val{font-size:13px;font-weight:500;color:var(--text);}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.info-card{background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;}
.info-card.full{grid-column:1/-1;}
.ic-lbl{font-family:'Space Mono',monospace;font-size:9px;color:var(--dim);
  text-transform:uppercase;letter-spacing:.12em;margin-bottom:4px;}
.ic-val{font-size:13px;color:var(--text);font-weight:500;line-height:1.4;}
.ai-block{background:rgba(200,169,110,.04);border:1px solid rgba(200,169,110,.15);
  border-radius:10px;padding:14px 16px;}
.ai-ttl{font-family:'Space Mono',monospace;font-size:9px;text-transform:uppercase;
  letter-spacing:.15em;color:var(--a1);margin-bottom:10px;
  display:flex;align-items:center;gap:8px;}
.ai-txt{font-size:12.5px;line-height:1.75;color:#b8cfe0;}
.news-block{background:rgba(79,195,247,.04);border:1px solid rgba(79,195,247,.15);
  border-radius:10px;padding:14px 16px;}
.news-ttl{font-family:'Space Mono',monospace;font-size:9px;text-transform:uppercase;
  letter-spacing:.15em;color:var(--a2);margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.spinner-wrap{display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:12px;padding:24px;}
.spinner{width:28px;height:28px;border:2px solid var(--border);
  border-top-color:var(--a1);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner-txt{font-family:'Space Mono',monospace;font-size:10px;color:var(--dim);}
.err-box{background:rgba(244,143,177,.06);border:1px solid rgba(244,143,177,.2);
  border-radius:8px;padding:12px;font-size:11px;color:#e8a0b8;line-height:1.6;}
.retry-btn{width:100%;margin-top:8px;padding:8px;background:rgba(200,169,110,.08);
  border:1px solid rgba(200,169,110,.25);color:var(--a1);cursor:pointer;
  border-radius:6px;font-family:'Space Mono',monospace;font-size:10px;transition:all .2s;}
.retry-btn:hover{background:rgba(200,169,110,.15);}
#q-bar{flex-shrink:0;border-top:1px solid var(--border);padding:12px 16px;background:var(--s1);}
.q-lbl{font-family:'Space Mono',monospace;font-size:9px;text-transform:uppercase;
  letter-spacing:.2em;color:var(--a1);margin-bottom:8px;
  display:flex;align-items:center;gap:6px;}
.q-row{display:flex;gap:8px;}
#q-input{flex:1;background:var(--s2);border:1px solid var(--border);border-radius:6px;
  color:var(--text);font-family:'Space Grotesk',sans-serif;font-size:12px;
  padding:8px 12px;outline:none;transition:border-color .2s;}
#q-input:focus{border-color:rgba(200,169,110,.4);}
#q-input::placeholder{color:var(--dim);}
#q-input:disabled{opacity:.4;}
#q-send{width:36px;height:36px;flex-shrink:0;background:var(--a1);border:none;
  color:#000;border-radius:6px;cursor:pointer;font-size:14px;
  display:flex;align-items:center;justify-content:center;
  font-weight:700;transition:opacity .2s;}
#q-send:hover{opacity:.85;}
#q-send:disabled{opacity:.3;cursor:not-allowed;}
#q-ans{margin-top:10px;font-size:12px;line-height:1.75;color:#b8cfe0;
  max-height:140px;overflow-y:auto;display:none;}
#q-ans.show{display:block;}
#q-ans::-webkit-scrollbar{width:2px;}
#q-ans::-webkit-scrollbar-thumb{background:var(--border);}
.q-thinking{font-family:'Space Mono',monospace;font-size:10px;color:var(--dim);
  display:flex;align-items:center;gap:8px;}
.q-spin{width:10px;height:10px;border:1.5px solid var(--border);
  border-top-color:var(--a1);border-radius:50%;animation:spin .6s linear infinite;}
#tip{position:fixed;background:rgba(8,13,26,.96);border:1px solid var(--border);
  padding:7px 14px;border-radius:8px;font-size:12px;color:var(--text);
  pointer-events:none;opacity:0;transition:opacity .15s;z-index:400;
  white-space:nowrap;display:flex;align-items:center;gap:8px;
  box-shadow:0 4px 24px rgba(0,0,0,.5);}
#tip canvas{border-radius:2px;border:1px solid rgba(255,255,255,.1);}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fade{animation:fadeUp .35s ease both;}
#hint{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);
  background:rgba(8,13,26,.9);border:1px solid var(--border);border-radius:20px;
  padding:7px 20px;font-family:'Space Mono',monospace;font-size:11px;color:var(--dim);
  pointer-events:none;z-index:100;white-space:nowrap;transition:opacity .5s;}
</style>
</head>
<body>
<div id="hdr">
  <div class="logo">
    <div class="logo-icon">
      <div class="logo-ring"></div>
      <div class="logo-dot"></div>
    </div>
    <div>
      <div class="logo-name">World<span>Pulse</span></div>
      <div class="logo-sub">Atlas · IA · Météo en direct</div>
    </div>
  </div>
  <div class="hdr-right">
    <div class="proj-toggle">
      <button class="proj-btn active" id="btn-flat" onclick="setProj('flat')">CARTE</button>
      <button class="proj-btn" id="btn-globe" onclick="setProj('globe')">GLOBE</button>
    </div>
    <div class="live-tag"><div class="live-dot"></div>Live</div>
  </div>
</div>
<div id="map-wrap"><svg id="world-map"></svg></div>
<div id="hint">Cliquez sur un pays pour explorer</div>
<div id="panel">
  <div class="p-hdr">
    <button id="p-close">✕</button>
    <div class="p-flag-wrap"><canvas id="p-flag" width="160" height="107"></canvas></div>
    <div class="p-country" id="p-name">—</div>
    <div class="p-capital" id="p-capital"></div>
  </div>
  <div class="p-badges" id="p-badges"></div>
  <div id="p-scroll">
    <div class="p-body" id="p-body">
      <div class="spinner-wrap" style="padding:60px 24px;">
        <div style="font-size:48px;margin-bottom:8px;">🌍</div>
        <div style="font-family:'Space Mono',monospace;font-size:11px;color:var(--dim);text-align:center">
          Sélectionnez un pays<br>sur la carte
        </div>
      </div>
    </div>
  </div>
  <div id="q-bar">
    <div class="q-lbl"><div class="live-dot" style="background:var(--a1);box-shadow:0 0 6px var(--a1)"></div>Question à l'IA sur ce pays</div>
    <div class="q-row">
      <input id="q-input" type="text" placeholder="Ex: Quelle est la situation économique ?" disabled>
      <button id="q-send" disabled>➤</button>
    </div>
    <div id="q-ans"></div>
  </div>
</div>
<div id="tip"><canvas id="tt-flag" width="36" height="24"></canvas><span id="tt-name"></span></div>
<div id="search-wrap">
  <div id="search-box">
    <span class="s-icon">⊕</span>
    <input id="s-input" type="text" placeholder="Rechercher un pays…" autocomplete="off">
  </div>
  <div id="s-results"></div>
</div>
<div id="zoom-btns">
  <button class="zbtn" id="zi">+</button>
  <button class="zbtn" id="zo">−</button>
  <button class="zbtn" id="zr" style="font-size:11px">⊙</button>
</div>

// ══════════════════════════════════════════
// MAP SETUP
// ══════════════════════════════════════════
let W=window.innerWidth, H=window.innerHeight;
const svg=d3.select('#world-map');
let projMode='flat';
let projection=d3.geoNaturalEarth1().scale(W/6.5).translate([W/2,H/2]);
let path=d3.geoPath().projection(projection);
const g=svg.append('g');
g.append('path').datum({type:'Sphere'}).attr('class','sphere').attr('d',path);
g.append('path').datum(d3.geoGraticule()()).attr('class','graticule').attr('d',path);
let currentT=d3.zoomIdentity;
const zoom=d3.zoom().scaleExtent([.7,14]).on('zoom',e=>{currentT=e.transform;g.attr('transform',currentT);});
svg.call(zoom);
document.getElementById('zi').onclick=()=>svg.transition().duration(350).call(zoom.scaleBy,1.5);
document.getElementById('zo').onclick=()=>svg.transition().duration(350).call(zoom.scaleBy,.67);
document.getElementById('zr').onclick=()=>svg.transition().duration(500).call(zoom.transform,d3.zoomIdentity);

function setProj(mode){
  projMode=mode;
  document.getElementById('btn-flat').classList.toggle('active',mode==='flat');
  document.getElementById('btn-globe').classList.toggle('active',mode==='globe');
  if(mode==='flat') projection=d3.geoNaturalEarth1().scale(W/6.5).translate([W/2,H/2]);
  else projection=d3.geoOrthographic().scale(Math.min(W,H)*.42).translate([W/2,H/2]);
  path=d3.geoPath().projection(projection);
  g.select('.sphere').attr('d',path);
  g.selectAll('.graticule').attr('d',path);
  g.selectAll('.country').attr('d',path);
  if(mode==='globe') startGlobeRotation();
  else stopGlobeRotation();
}
let rotTimer=null;
function startGlobeRotation(){
  if(rotTimer) return;
  let r=0;
  rotTimer=d3.interval(()=>{r+=.15;projection.rotate([r,0]);path=d3.geoPath().projection(projection);g.select('.sphere').attr('d',path);g.selectAll('.graticule').attr('d',path);g.selectAll('.country').attr('d',path);},16);
}
function stopGlobeRotation(){if(rotTimer){rotTimer.stop();rotTimer=null;}}

fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json')
.then(r=>r.json())
.then(world=>{
  const countries=topojson.feature(world,world.objects.countries);
  g.selectAll('.country').data(countries.features).join('path')
    .attr('class','country').attr('d',path)
    .on('mouseover',function(event,d){
      const id=String(d.id).padStart(3,'0');
      const name=NAMES[id]; if(!name) return;
      document.getElementById('tt-name').textContent=name;
      drawFlag(document.getElementById('tt-flag'),ALPHA2[name]||'');
      const tip=document.getElementById('tip');
      tip.style.opacity='1';tip.style.left=(event.pageX+14)+'px';tip.style.top=(event.pageY-28)+'px';
    })
    .on('mousemove',event=>{const tip=document.getElementById('tip');tip.style.left=(event.pageX+14)+'px';tip.style.top=(event.pageY-28)+'px';})
    .on('mouseout',()=>document.getElementById('tip').style.opacity='0')
    .on('click',function(event,d){
      const id=String(d.id).padStart(3,'0');
      const name=NAMES[id]; if(!name) return;
      stopGlobeRotation();
      g.selectAll('.country').classed('active',false).classed('dimmed',true);
      d3.select(this).classed('active',true).classed('dimmed',false);
      openPanel(name);
      document.getElementById('hint').style.opacity='0';
    });
});

// ══════════════════════════════════════════
// SEARCH
// ══════════════════════════════════════════
const allNames=Object.values(NAMES).filter((v,i,a)=>a.indexOf(v)===i).sort();
const sInput=document.getElementById('s-input');
const sResults=document.getElementById('s-results');
sInput.addEventListener('input',function(){
  const q=this.value.toLowerCase().trim();
  if(!q){sResults.style.display='none';return;}
  const matches=allNames.filter(n=>n.toLowerCase().includes(q)).slice(0,8);
  if(!matches.length){sResults.style.display='none';return;}
  sResults.innerHTML=matches.map(n=>{const code=ALPHA2[n]||'';return `<div class="s-item" onclick="selectCountry('${n.replace(/'/g,"\\'")}')"><canvas class="s-item-flag" width="40" height="28" id="sf-${code}"></canvas><span class="s-item-name">${n}</span><span class="s-item-code">${code.toUpperCase()}</span></div>`;}).join('');
  sResults.style.display='block';
  matches.forEach(n=>{const code=ALPHA2[n]||'';const c=document.getElementById('sf-'+code);if(c)drawFlag(c,code);});
});
sInput.addEventListener('keydown',e=>{if(e.key==='Enter'){const q=sInput.value.toLowerCase().trim();const m=allNames.find(n=>n.toLowerCase().includes(q));if(m)selectCountry(m);}});
document.addEventListener('click',e=>{if(!document.getElementById('search-wrap').contains(e.target))sResults.style.display='none';});
function selectCountry(name){
  sInput.value='';sResults.style.display='none';
  g.selectAll('.country').each(function(d){const id=String(d.id).padStart(3,'0');if(NAMES[id]===name){g.selectAll('.country').classed('active',false).classed('dimmed',true);d3.select(this).classed('active',true).classed('dimmed',false);}});
  openPanel(name);
}

// PANEL
// ══════════════════════════════════════════
let activeCountry=null;
document.getElementById('p-close').onclick=closePanel;
function closePanel(){
  document.getElementById('panel').classList.remove('open');
  g.selectAll('.country').classed('active',false).classed('dimmed',false);
  activeCountry=null;
}

async function openPanel(name){
  activeCountry=name;
  const code=ALPHA2[name]||'';
  document.getElementById('panel').classList.add('open');
  document.getElementById('p-name').textContent=name;
  document.getElementById('p-capital').textContent='Chargement…';
  document.getElementById('p-badges').innerHTML='';
  document.getElementById('q-input').disabled=true;
  document.getElementById('q-send').disabled=true;
  document.getElementById('q-ans').className='';
  document.getElementById('q-ans').innerHTML='';
  drawFlag(document.getElementById('p-flag'),code);
  document.getElementById('p-body').innerHTML=`<div class="spinner-wrap"><div class="spinner"></div><div class="spinner-txt">Analyse IA en cours…</div></div>`;
  await Promise.all([fetchAI(name,code), fetchWeather(name)]);
}

async function fetchWeather(name){
  const cap=CAPITALS[name]; if(!cap) return;
  try{
    const url=`https://api.open-meteo.com/v1/forecast?latitude=${cap.lat}&longitude=${cap.lon}&current=temperature_2m,weathercode,windspeed_10m,relativehumidity_2m,apparent_temperature,precipitation&timezone=auto`;
    const d=await(await fetch(url)).json();
    const c=d.current;
    const[desc,icon]=WMO[c.weathercode]||['—','🌡️'];
    const wx=`<div class="sec"><div class="sec-ttl">Météo à la capitale</div>
    <div class="wx-card"><div class="wx-main"><div class="wx-icon">${icon}</div>
    <div><div class="wx-temp">${Math.round(c.temperature_2m)}°C</div><div class="wx-desc">${desc}</div></div></div>
    <div class="wx-grid">
      <div class="wx-stat"><div class="wx-stat-lbl">Ressenti</div><div class="wx-stat-val">${Math.round(c.apparent_temperature)}°C</div></div>
      <div class="wx-stat"><div class="wx-stat-lbl">Humidité</div><div class="wx-stat-val">${c.relativehumidity_2m}%</div></div>
      <div class="wx-stat"><div class="wx-stat-lbl">Vent</div><div class="wx-stat-val">${Math.round(c.windspeed_10m)} km/h</div></div>
      <div class="wx-stat"><div class="wx-stat-lbl">Précip.</div><div class="wx-stat-val">${c.precipitation} mm</div></div>
    </div></div></div>`;
    document.getElementById('p-body').insertAdjacentHTML('afterbegin',wx);
  }catch(e){}
}

// ══════════════════════════════════════════
// AI via serverless proxy — clé JAMAIS côté client
// ══════════════════════════════════════════
async function fetchAI(name, code){
  try{
    const res=await fetch('/api/ask',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({country:name, type:'info'})
    });
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    const {text}=await res.json();
    let info;
    try{info=JSON.parse(text);}catch{const m=text.match(/\{[\s\S]*\}/);if(m)info=JSON.parse(m[0]);else throw new Error('Parse JSON failed');}
    renderPanel(name,info);
  }catch(e){
    document.getElementById('p-body').innerHTML+=`<div class="err-box">⚠️ Erreur IA: ${e.message}</div>
    <button class="retry-btn" onclick="fetchAI('${name.replace(/'/g,"\\'")}','${ALPHA2[name]||''}')">🔄 Réessayer</button>`;
    document.getElementById('p-capital').textContent='—';
  }
}

function renderPanel(name,info){
  document.getElementById('p-capital').textContent=info.capital||'—';
  const badgeMap={'Démocratie':'b-blue','Dictature':'b-red','Monarchie':'b-gold','Fédération':'b-blue','Théocratie':'b-purple','OTAN':'b-blue','UE':'b-blue','BRICS':'b-orange','G7':'b-gold','G20':'b-orange','ONU':'b-blue','Stable':'b-green','Tensions':'b-orange','Conflit':'b-red','Guerre':'b-red','Nucléaire':'b-purple','Pétrole':'b-gold','Économie forte':'b-green','En développement':'b-orange','Île':'b-blue','Enclavé':'b-orange','Arctique':'b-blue'};
  document.getElementById('p-badges').innerHTML=(info.badges||[]).map(b=>`<span class="badge ${badgeMap[b]||'b-blue'}">${b}</span>`).join('');
  document.getElementById('p-body').innerHTML=`
  <div class="sec fade"><div class="sec-ttl">Informations</div>
  <div class="info-grid">
    <div class="info-card"><div class="ic-lbl">Population</div><div class="ic-val">${info.population||'—'}</div></div>
    <div class="info-card"><div class="ic-lbl">Superficie</div><div class="ic-val">${info.superficie||'—'}</div></div>
    <div class="info-card"><div class="ic-lbl">PIB</div><div class="ic-val">${info.pib||'—'}</div></div>
    <div class="info-card"><div class="ic-lbl">Monnaie</div><div class="ic-val">${info.monnaie||'—'}</div></div>
    <div class="info-card full"><div class="ic-lbl">Langue(s)</div><div class="ic-val">${info.langue||'—'}</div></div>
    <div class="info-card full"><div class="ic-lbl">Religion(s)</div><div class="ic-val">${info.religion||'—'}</div></div>
  </div></div>
  <div class="sec fade"><div class="sec-ttl">Analyse géopolitique</div>
  <div class="ai-block"><div class="ai-ttl"><div class="live-dot" style="background:var(--a1);box-shadow:0 0 6px var(--a1)"></div>IA</div>
  <div class="ai-txt">${info.description||'—'}</div></div></div>
  ${info.actualite?`<div class="sec fade"><div class="sec-ttl">Actualité récente</div>
  <div class="news-block"><div class="news-ttl"><div class="live-dot" style="background:var(--a2);box-shadow:0 0 6px var(--a2)"></div>Événement</div>
  <div class="ai-txt" style="color:#b0d8f0">${info.actualite}</div></div></div>`:''}
  <button class="retry-btn" onclick="openPanel('${name.replace(/'/g,"\\'")}')">🔄 Actualiser</button>
  <div style="height:12px"></div>`;
  document.getElementById('q-input').disabled=false;
  document.getElementById('q-send').disabled=false;
}

async function askQ(){
  if(!activeCountry) return;
  const inp=document.getElementById('q-input');
  const btn=document.getElementById('q-send');
  const ans=document.getElementById('q-ans');
  const q=inp.value.trim(); if(!q) return;
  inp.disabled=true; btn.disabled=true;
  ans.className='show';
  ans.innerHTML='<div class="q-thinking"><div class="q-spin"></div>Analyse en cours…</div>';
  try{
    const res=await fetch('/api/ask',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({country:activeCountry, question:q, type:'qa'})
    });
    const {text}=await res.json();
    ans.innerHTML=`<span style="font-family:'Space Mono',monospace;font-size:9px;color:var(--a1);text-transform:uppercase;letter-spacing:.1em;display:block;margin-bottom:6px">Réponse IA</span>${text}`;
  }catch(e){ans.innerHTML=`<span style="color:#e8a0b8">Erreur: ${e.message}</span>`;}
  finally{inp.disabled=false;btn.disabled=false;inp.value='';inp.focus();}
}
document.getElementById('q-send').onclick=askQ;
document.getElementById('q-input').addEventListener('keydown',e=>{if(e.key==='Enter')askQ();});

window.addEventListener('resize',()=>{
  W=window.innerWidth;H=window.innerHeight;
  if(projMode==='flat') projection.scale(W/6.5).translate([W/2,H/2]);
  else projection.scale(Math.min(W,H)*.42).translate([W/2,H/2]);
  path=d3.geoPath().projection(projection);
  g.select('.sphere').attr('d',path);g.selectAll('.graticule').attr('d',path);g.selectAll('.country').attr('d',path);
});
</script>
