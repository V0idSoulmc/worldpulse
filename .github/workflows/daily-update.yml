name: 🌍 WorldPulse Daily Update

on:
  schedule:
    # Runs every day at 07:00 UTC
    - cron: "0 7 * * *"
  workflow_dispatch:  # allows manual trigger from GitHub UI

permissions:
  contents: write  # needed to push commits

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    name: Fetch data & update dashboard

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: ⚡ Run WorldPulse bot
        run: python update_site.py

      - name: 📊 Show what changed
        run: |
          echo "=== Files changed ==="
          git diff --stat || echo "No diff"

      - name: 📝 Commit & push
        run: |
          git config user.name  "WorldPulse Bot"
          git config user.email "worldpulse-bot@users.noreply.github.com"
          git add index.html data/worldpulse.json
          git diff --cached --quiet && echo "Nothing to commit." && exit 0
          git commit -m "🌍 WorldPulse update — $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
